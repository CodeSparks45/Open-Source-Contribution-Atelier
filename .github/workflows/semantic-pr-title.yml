name: Semantic PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            // Matches conventional commits like: feat: added feature, fix(auth): bug fixed
            const conventionalCommitRegex = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9\-]+\))?:\s.+$/i;
            
            if (!conventionalCommitRegex.test(title)) {
              core.setFailed(`PR title "${title}" does not follow Conventional Commits format. It must start with one of: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert. Example: "feat: add user authentication"`);
            }
