name: PR Size Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label-size:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Label PR based on size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const totalChanges = additions + deletions;
            
            let sizeLabel = '';
            if (totalChanges < 50) sizeLabel = 'size/S';
            else if (totalChanges < 200) sizeLabel = 'size/M';
            else if (totalChanges < 500) sizeLabel = 'size/L';
            else sizeLabel = 'size/XL';

            const sizeLabels = ['size/S', 'size/M', 'size/L', 'size/XL'];

            try {
              // Get current labels
              const labelsData = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });
              
              const currentLabels = labelsData.data.map(l => l.name);
              
              // Remove old size labels
              for (const label of currentLabels) {
                if (sizeLabels.includes(label) && label !== sizeLabel) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    name: label
                  });
                }
              }

              // Add new size label if not already present
              if (!currentLabels.includes(sizeLabel)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: [sizeLabel]
                });
              }
              console.log(`Labeled PR #${pr.number} as ${sizeLabel} (${totalChanges} changes)`);
            } catch (error) {
              console.log('Error labeling PR size:', error);
            }
